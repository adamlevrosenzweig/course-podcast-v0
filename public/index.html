<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Overhang</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0d;
      --surface: #1a1a17;
      --surface2: #222220;
      --border: #2e2e2a;
      --accent: #c8a96e;
      --accent-dim: #8a7048;
      --text: #e8e6df;
      --text-muted: #7a7870;
      --text-dim: #b0ae a7;
      --intimate: #7eb8c9;
      --impact: #9fbb8a;
      --shared: #c8a96e;
      --red: #c06060;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Layout */
    .app { display: flex; min-height: 100vh; }

    .sidebar {
      width: 220px;
      min-width: 220px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      overflow-y: auto;
      z-index: 10;
    }

    .main {
      margin-left: 220px;
      flex: 1;
      max-width: 820px;
      padding: 48px 48px 80px;
    }

    /* Sidebar */
    .sidebar-header {
      padding: 28px 20px 20px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-logo {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.02em;
    }
    .sidebar-sub {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .sidebar-nav { padding: 16px 0; flex: 1; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 20px;
      font-size: 13px;
      font-weight: 400;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      border-left: 2px solid transparent;
      letter-spacing: 0.01em;
    }
    .nav-item:hover { color: var(--text); background: var(--surface2); }
    .nav-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(200,169,110,0.06); }
    .nav-icon { font-size: 15px; width: 18px; text-align: center; }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-muted);
    }

    /* Page sections */
    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.2;
    }
    .page-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 36px;
      letter-spacing: 0.01em;
    }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }
    .card-meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 14px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      font-size: 13px;
      font-weight: 500;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.02em;
    }
    .btn-primary { background: var(--accent); color: #0f0f0d; }
    .btn-primary:hover { background: #d4b87a; }
    .btn-primary:disabled { background: var(--accent-dim); cursor: not-allowed; opacity: 0.6; }
    .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--text-muted); }
    .btn-danger { background: transparent; color: var(--red); border: 1px solid var(--red); }
    .btn-danger:hover { background: rgba(192,96,96,0.1); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }

    /* Audio player */
    .audio-player {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px 20px;
      margin: 16px 0;
    }
    .audio-player audio { width: 100%; margin-top: 8px; }
    .audio-player audio::-webkit-media-controls-panel { background: var(--surface2); }

    .audio-actions { display: flex; gap: 10px; margin-top: 12px; align-items: center; }

    /* Script */
    .script-text {
      font-size: 15px;
      line-height: 1.85;
      color: var(--text);
      white-space: pre-wrap;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 24px;
      margin: 16px 0;
    }

    /* Tags */
    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .tag-intimate { background: rgba(126,184,201,0.15); color: var(--intimate); }
    .tag-impact { background: rgba(159,187,138,0.15); color: var(--impact); }
    .tag-shared { background: rgba(200,169,110,0.15); color: var(--shared); }
    .tag-contributed { background: rgba(192,96,96,0.15); color: var(--red); }

    /* Source list */
    .source-item {
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 16px;
      margin-bottom: 10px;
      background: var(--surface);
      transition: border-color 0.15s;
    }
    .source-item:hover { border-color: var(--accent-dim); }
    .source-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 6px;
    }
    .source-title a { color: inherit; text-decoration: none; }
    .source-title a:hover { color: var(--accent); }
    .source-summary { font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-bottom: 8px; }
    .source-footer { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    /* Inputs */
    input[type="text"], input[type="url"], textarea, select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 9px 12px;
      font-size: 13px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus, input[type="url"]:focus, textarea:focus, select:focus {
      border-color: var(--accent-dim);
    }
    textarea { resize: vertical; min-height: 80px; }
    label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; letter-spacing: 0.03em; text-transform: uppercase; }
    .form-group { margin-bottom: 16px; }

    /* Theme grid */
    .theme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .theme-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .theme-item.active { color: var(--text); border-color: var(--accent-dim); }
    .theme-toggle {
      width: 16px; height: 16px;
      border-radius: 3px;
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .theme-toggle.checked { background: var(--accent); border-color: var(--accent); }
    .theme-name { flex: 1; line-height: 1.3; }
    .theme-actions { display: flex; gap: 6px; }

    /* Episode list */
    .ep-item {
      display: flex;
      align-items: baseline;
      gap: 16px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.15s;
    }
    .ep-item:hover .ep-title { color: var(--accent); }
    .ep-num { font-size: 12px; color: var(--text-muted); min-width: 28px; }
    .ep-title { font-size: 14px; color: var(--text); flex: 1; }
    .ep-meta { font-size: 12px; color: var(--text-muted); }

    /* Search */
    .search-bar { position: relative; margin-bottom: 24px; }
    .search-bar input { padding-left: 36px; }
    .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 14px; }

    /* Status/spinner */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--accent-dim);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status-line {
      font-size: 13px;
      color: var(--text-muted);
      padding: 12px 0;
      border-top: 1px solid var(--border);
      margin-top: 16px;
    }
    .status-line.error { color: var(--red); }

    /* Dividers */
    .section-label {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin: 28px 0 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .empty-state { text-align: center; padding: 48px 0; color: var(--text-muted); font-size: 14px; }

    /* Feedback */
    .feedback-item {
      background: var(--surface2);
      border-left: 2px solid var(--accent-dim);
      padding: 10px 14px;
      margin-bottom: 8px;
      border-radius: 0 4px 4px 0;
      font-size: 13px;
      color: var(--text-muted);
    }
    .feedback-date { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

    /* Generate page */
    .generate-hero {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 36px;
      text-align: center;
      background: var(--surface);
      margin-bottom: 28px;
    }
    .generate-hero-title {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      margin-bottom: 8px;
      color: var(--text);
    }
    .generate-hero-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; line-height: 1.6; }

    .progress-steps { margin: 20px 0; }
    .progress-step {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
      font-size: 13px;
      color: var(--text-muted);
    }
    .step-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
    .step-dot.active { background: var(--accent); box-shadow: 0 0 6px rgba(200,169,110,0.4); }
    .step-dot.done { background: var(--impact); }

    /* ── Mobile bottom nav (hidden on desktop) ── */
    .mobile-nav { display: none; }

    @media (max-width: 680px) {
      /* Hide sidebar, show bottom nav instead */
      .sidebar { display: none; }

      .mobile-nav {
        display: flex;
        position: fixed;
        bottom: 0; left: 0; right: 0;
        background: var(--surface);
        border-top: 1px solid var(--border);
        z-index: 100;
        padding-bottom: env(safe-area-inset-bottom, 0);
      }
      .mobile-nav-item {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 8px 2px 6px;
        font-size: 10px;
        letter-spacing: 0.02em;
        color: var(--text-muted);
        cursor: pointer;
        min-height: 52px;
        gap: 3px;
        transition: color 0.15s;
        -webkit-tap-highlight-color: transparent;
      }
      .mobile-nav-item.active { color: var(--accent); }
      .mobile-nav-icon { font-size: 17px; line-height: 1; }

      /* Main content */
      .main {
        margin-left: 0;
        padding: 20px 16px 76px; /* bottom pad clears the nav bar */
        max-width: 100%;
      }

      /* Typography */
      .page-title { font-size: 22px; margin-bottom: 4px; }
      .page-subtitle { margin-bottom: 24px; }

      /* Cards */
      .card { padding: 16px; }

      /* Bigger touch targets on buttons */
      .btn { padding: 11px 16px; min-height: 44px; }
      .btn-sm { min-height: 36px; padding: 7px 12px; }

      /* Generate hero */
      .generate-hero { padding: 24px 16px; }
      .generate-hero-title { font-size: 20px; }

      /* Source items: tighter */
      .source-item { padding: 12px; }

      /* Theme grid: single column */
      .theme-grid { grid-template-columns: 1fr; }

      /* Episode list: hide number, show as simpler rows */
      .ep-num { display: none; }

      /* Audio actions: wrap on small screens */
      .audio-actions { flex-wrap: wrap; }

      /* Script text: smaller padding */
      .script-text { padding: 16px; font-size: 14px; }

      /* Inputs: bigger tap targets */
      input[type="text"], input[type="url"], textarea, select {
        padding: 11px 12px;
        font-size: 16px; /* prevents iOS zoom on focus */
      }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const API = '';

async function apiFetch(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
    ...opts,
    body: opts.body ? (typeof opts.body === 'string' ? opts.body : JSON.stringify(opts.body)) : undefined,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: res.statusText }));
    throw new Error(err.error || res.statusText);
  }
  return res.json();
}

function CourseTag({ courses }) {
  if (!courses || courses.length === 0) return null;
  const hasIntimate = courses.includes('intimate_tech');
  const hasImpact = courses.includes('social_impact');
  if (hasIntimate && hasImpact) return <span className="tag tag-shared">Both Courses</span>;
  if (hasIntimate) return <span className="tag tag-intimate">Intimate Tech</span>;
  if (hasImpact) return <span className="tag tag-impact">Social Impact</span>;
  return null;
}

// ── TODAY PAGE ──────────────────────────────────────────────────────────────

function TodayPage({ onNavigate }) {
  const [episodes, setEpisodes] = useState([]);
  const [latest, setLatest] = useState(null);
  const [loading, setLoading] = useState(true);
  const [generating, setGenerating] = useState(false);
  const [generatingAudio, setGeneratingAudio] = useState(false);
  const [status, setStatus] = useState('');
  const [error, setError] = useState('');
  const [showScript, setShowScript] = useState(false);
  const [feedbackNote, setFeedbackNote] = useState('');
  const [feedbackSource, setFeedbackSource] = useState('');
  const [feedback, setFeedback] = useState([]);
  const [discoveringSources, setDiscoveringSources] = useState(false);
  const [episodeType, setEpisodeType] = useState('dialogue');
  const [publishDate, setPublishDate] = useState('');
  const [publishSaving, setPublishSaving] = useState(false);
  const [showNotesOpen, setShowNotesOpen] = useState(false);
  const [editShowNotes, setEditShowNotes] = useState('');
  const [showNotesSaving, setShowNotesSaving] = useState(null);

  const load = useCallback(async () => {
    try {
      const eps = await apiFetch('/api/episodes');
      setEpisodes(eps);
      if (eps.length > 0) {
        const ep = await apiFetch(`/api/episodes/${eps[0].id}`);
        setLatest(ep);
        const fb = await apiFetch(`/api/feedback?episode_id=${eps[0].id}`);
        setFeedback(fb);
      }
    } catch (e) { setError(e.message); }
    setLoading(false);
  }, []);

  useEffect(() => { load(); }, [load]);

  async function generate() {
    setGenerating(true);
    setError('');
    setStatus('Starting generation…');
    try {
      await apiFetch('/api/episodes/generate', { method: 'POST', body: { episode_type: episodeType } });
      // Poll every 3s until done
      let done = false;
      while (!done) {
        await new Promise(r => setTimeout(r, 3000));
        const job = await apiFetch('/api/episodes/generate/status');
        if (job.status === 'complete') {
          done = true;
          setStatus('');
          await load();
        } else if (job.status === 'error') {
          done = true;
          setError(job.error || 'Generation failed');
          setStatus('');
        } else {
          setStatus(job.step || 'Working…');
        }
      }
    } catch (e) {
      setError(e.message);
      setStatus('');
    }
    setGenerating(false);
  }

  async function generateAudio() {
    if (!latest) return;
    setGeneratingAudio(true);
    setError('');
    setStatus('Starting audio generation…');
    try {
      await apiFetch(`/api/episodes/${latest.id}/audio`, { method: 'POST', body: {} });
      let done = false;
      while (!done) {
        await new Promise(r => setTimeout(r, 3000));
        const job = await apiFetch(`/api/episodes/${latest.id}/audio/status`);
        if (job.status === 'complete') {
          done = true;
          setLatest(prev => ({ ...prev, audio_filename: job.filename }));
          setStatus('');
        } else if (job.status === 'error') {
          done = true;
          setError(job.error || 'Audio generation failed');
          setStatus('');
        } else {
          setStatus(job.step || 'Generating audio…');
        }
      }
    } catch (e) {
      setError(e.message);
      setStatus('');
    }
    setGeneratingAudio(false);
  }

  async function setEpStatus(ep, status) {
    setPublishSaving(true);
    try {
      await apiFetch(`/api/episodes/${ep.id}/status`, {
        method: 'PATCH',
        body: { status, publish_at: status === 'scheduled' ? publishDate : null }
      });
      await load();
    } catch(e) { setError(e.message); }
    setPublishSaving(false);
  }

  async function discoverSources() {
    if (!latest) return;
    setDiscoveringSources(true);
    setError('');
    try {
      await apiFetch(`/api/episodes/${latest.id}/sources/discover`, { method: 'POST', body: {} });
      await load();
    } catch(e) { setError(e.message); }
    setDiscoveringSources(false);
  }

  async function generateShowNotes() {
    if (!latest) return;
    setShowNotesSaving('generating');
    try {
      const res = await apiFetch(`/api/episodes/${latest.id}/show-notes/generate`, { method: 'POST', body: {} });
      setEditShowNotes(res.show_notes);
      setLatest(prev => ({ ...prev, show_notes: res.show_notes }));
    } catch(e) { setError(e.message); }
    setShowNotesSaving(null);
  }

  async function saveShowNotes() {
    if (!latest) return;
    setShowNotesSaving('saving');
    try {
      await apiFetch(`/api/episodes/${latest.id}/show-notes`, { method: 'PATCH', body: { show_notes: editShowNotes } });
      setLatest(prev => ({ ...prev, show_notes: editShowNotes }));
    } catch(e) { setError(e.message); }
    setShowNotesSaving(null);
  }

  async function submitFeedback(e) {
    e.preventDefault();
    if (!feedbackNote.trim()) return;
    try {
      await apiFetch('/api/feedback', {
        method: 'POST',
        body: { note: feedbackNote, episode_id: latest?.id, source_id: feedbackSource || null }
      });
      setFeedbackNote('');
      setFeedbackSource('');
      const fb = await apiFetch(`/api/feedback?episode_id=${latest.id}`);
      setFeedback(fb);
    } catch (e) { setError(e.message); }
  }

  if (loading) return <div style={{padding: '48px', color: 'var(--text-muted)'}}>Loading…</div>;

  const today = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

  return (
    <div>
      <p className="page-subtitle">{today}</p>
      <h1 className="page-title">Today's Episode</h1>

      {!latest && !generating && (
        <div className="generate-hero">
          <div className="generate-hero-title">No episode yet for today</div>
          <div className="generate-hero-sub">
            Generate today's episode to search the web for relevant stories across<br />
            Intimate Technology and Social Impact Strategy.
          </div>
          <div style={{display:'flex',gap:'8px',justifyContent:'center',marginBottom:'16px'}}>
            {['dialogue','megan_only'].map(t => (
              <button key={t} className={`btn btn-sm${episodeType === t ? ' btn-primary' : ' btn-ghost'}`}
                onClick={() => setEpisodeType(t)}>
                {t === 'dialogue' ? 'Dialogue' : 'Megan Only'}
              </button>
            ))}
          </div>
          <button className="btn btn-primary" onClick={generate}>
            Generate Today's Episode
          </button>
        </div>
      )}

      {generating && (
        <div className="generate-hero">
          <div className="generate-hero-title">Generating Episode {(episodes[0]?.number || 0) + 1}</div>
          <div style={{display: 'flex', alignItems: 'center', gap: '10px', justifyContent: 'center', marginTop: '16px'}}>
            <div className="spinner"></div>
            <span style={{fontSize: '13px', color: 'var(--text-muted)'}}>{status}</span>
          </div>
          <div className="progress-steps" style={{textAlign: 'left', maxWidth: '280px', margin: '20px auto 0'}}>
            <div className="progress-step"><div className="step-dot done"></div>Connecting to Anthropic API</div>
            <div className="progress-step"><div className="step-dot active"></div>Searching the web for stories</div>
            <div className="progress-step"><div className="step-dot"></div>Synthesizing podcast script</div>
            <div className="progress-step"><div className="step-dot"></div>Saving to source repository</div>
          </div>
        </div>
      )}

      {latest && !generating && (
        <>
          <div className="card">
            <div className="card-title" style={{marginBottom: '6px'}}>
              {latest.title || `Episode ${latest.number} · ${latest.date}`}
            </div>
            <div className="card-meta" style={{marginBottom: '14px'}}>

                <audio controls src={`/audio/${latest.audio_filename}`} />
                <div className="audio-actions">

              <div style={{marginTop:'16px',paddingTop:'16px',borderTop:'1px solid var(--border)',display:'flex',gap:'8px',flexWrap:'wrap',alignItems:'center'}}>

              <div style={{marginTop:'16px',paddingTop:'16px',borderTop:'1px solid var(--border)',display:'flex',gap:'8px',alignItems:'center',flexWrap:'wrap'}}>
                <span style={{fontSize:'12px',color:'var(--text-muted)'}}>Scheduled for {latest.publish_at}</span>
                <button className="btn btn-sm" onClick={() => setEpStatus(latest, 'draft')} disabled={publishSaving}>Unschedule</button>
                <button className="btn btn-primary btn-sm" onClick={() => setEpStatus(latest, 'published')} disabled={publishSaving}>Publish now</button>
              </div>

            {latest.status === 'published' && (
              <div style={{marginTop:'16px',paddingTop:'16px',borderTop:'1px solid var(--border)'}}>
                <span style={{fontSize:'12px',color:'var(--impact)',fontWeight:500}}>● Published</span>
              </div>
            )}

            <div style={{marginTop: '14px'}}>
              <button className="btn btn-ghost btn-sm" onClick={() => setShowScript(s => !s)}>
                {showScript ? 'Hide Script' : 'View Script'}

              <div className="script-text">{latest.script}</div>

          <div className="section-label" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>

              <button className="btn btn-sm" onClick={discoverSources} disabled={discoveringSources}>
                {discoveringSources ? '⟳ Discovering…' : '⊕ Discover sources'}
              </button>
            )}
          </div>
          {(latest.sources || []).map(s => (
            <SourceCard key={s.id} source={s} showFeedback onDelete={id => setLatest(prev => ({...prev, sources: prev.sources.filter(x => x.id !== id)}))} />
          ))}

          {/* Show Notes */}
          <div style={{marginTop:'16px',borderTop:'1px solid var(--border)',paddingTop:'12px'}}>

                onClick={() => {
                  if (!showNotesOpen) setEditShowNotes(latest.show_notes || '');
                  setShowNotesOpen(v => !v);
                }}
              >

                {latest.show_notes ? '' : <span style={{color:'var(--text-muted)',marginLeft:'6px',fontWeight:400}}>(not yet generated)</span>}
              </button>

              <div>
                <textarea
                  value={editShowNotes}

                  style={{width:'100%',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'4px',padding:'10px 12px',color:'var(--text)',fontSize:'12px',fontFamily:'monospace',lineHeight:'1.5',resize:'vertical'}}

                <div style={{display:'flex',gap:'8px',marginTop:'6px',marginBottom:'12px'}}>
                  <button className="btn btn-primary btn-sm" onClick={saveShowNotes} disabled={!!showNotesSaving}>
                    {showNotesSaving === 'saving' ? 'Saving…' : 'Save'}
                  </button>

                {editShowNotes && (
                  <div style={{borderTop:'1px solid var(--border)',paddingTop:'10px'}}>
                    <div style={{fontSize:'11px',color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:'8px'}}>Preview</div>

                      dangerouslySetInnerHTML={{__html: editShowNotes}}
                    />
                  </div>
                )}

            )}
          </div>

          {/* Feedback */}
          <div className="section-label">Notes & Questions</div>
          {feedback.map(f => (
            <div key={f.id} className="feedback-item">
              {f.source_title && <div style={{fontSize: '11px', color: 'var(--accent)', marginBottom: '4px', textTransform: 'uppercase', letterSpacing: '0.04em'}}>Re: {f.source_title}</div>}
              {f.note}
              <div className="feedback-date">{new Date(f.created_at).toLocaleString()}</div>
            </div>
          ))}

          <form onSubmit={submitFeedback} style={{marginTop: '16px'}}>
            <div className="form-group">
              <label>Leave a Note or Question</label>
              <textarea
                value={feedbackNote}
                onChange={e => setFeedbackNote(e.target.value)}
                placeholder="Ask a question about a source, note something to follow up on…"
              />
            </div>
            {latest.sources?.length > 0 && (
              <div className="form-group">
                <label>About a specific source (optional)</label>
                <select value={feedbackSource} onChange={e => setFeedbackSource(e.target.value)}>
                  <option value="">General episode note</option>
                  {(latest.sources || []).map(s => (
                    <option key={s.id} value={s.id}>{s.title}</option>
                  ))}
                </select>
              </div>
            )}
            <button type="submit" className="btn btn-ghost btn-sm">Save Note</button>
          </form>
        </>
      )}

      {error && <div className="status-line error">Error: {error}</div>}

      {!generating && (
        <div style={{marginTop: '28px', paddingTop: '20px', borderTop: '1px solid var(--border)', display:'flex', gap:'8px', alignItems:'center', flexWrap:'wrap'}}>
          {['dialogue','megan_only'].map(t => (
            <button key={t} className={`btn btn-sm${episodeType === t ? ' btn-primary' : ' btn-ghost'}`}
              onClick={() => setEpisodeType(t)}>
              {t === 'dialogue' ? 'Dialogue' : 'Megan Only'}
            </button>
          ))}
          <button className="btn btn-ghost btn-sm" onClick={generate}>
            Generate New Episode
          </button>
        </div>
      )}
    </div>
  );
}

// ── SOURCE CARD ─────────────────────────────────────────────────────────────

function getOutlet(url) {
  if (!url) return null;
  try {
    return new URL(url).hostname.replace(/^www\./, '');
  } catch { return null; }
}

function SourceCard({ source, onDelete }) {
  const [showFb, setShowFb] = useState(false);
  const [note, setNote] = useState(``);
  const [saved, setSaved] = useState(false);
  const [existingNotes, setExistingNotes] = useState(
    source.notes ? source.notes.split('|||').filter(Boolean) : []
  );

  async function deleteSource() {
    if (!confirm(`Remove "${source.title || source.url}" from this episode's show notes?`)) return;
    try {
      await apiFetch(`/api/sources/${source.id}`, { method: 'DELETE' });
      if (onDelete) onDelete(source.id);
    } catch {}
  }

  const courses = typeof source.courses === 'string' ? JSON.parse(source.courses) : (source.courses || []);
  const outlet = getOutlet(source.url);
  const noteCount = existingNotes.length;

  async function saveFeedback(e) {
    e.preventDefault();
    if (!note.trim()) return;
    try {
      await apiFetch('/api/feedback', { method: 'POST', body: { note, source_id: source.id, episode_id: source.episode_id } });
      setExistingNotes(prev => [...prev, note]);
      setNote(``);
      setSaved(true);
      setTimeout(() => setSaved(false), 2000);
    } catch {}
  }

  return (
    <div className="source-item">
      {outlet && (
        <div style={{fontSize:'11px', color:'var(--text-muted)', marginBottom:'4px', textTransform:'uppercase', letterSpacing:'0.06em', fontWeight:600}}>
          {outlet}
        </div>
      )}
      <div className="source-title">
        {source.url ? <a href={source.url} target="_blank" rel="noopener">{source.title}</a> : source.title}
      </div>
      {source.summary && <div className="source-summary">{source.summary}</div>}
      {(outlet || source.published_date || source.url) && (
        <div style={{fontSize:'11px', color:'var(--text-muted)', marginTop:'8px', marginBottom:'4px', lineHeight:'1.5'}}>
          <span style={{fontStyle:'italic'}}>
            {[outlet, source.published_date].filter(Boolean).join(' · ')}
          </span>
          {source.url && (
            <span> · <a href={source.url} target="_blank" rel="noopener" style={{color:'var(--text-muted)', wordBreak:'break-all'}}>
              {source.url.length > 70 ? source.url.slice(0, 70) + '…' : source.url}
            </a></span>
          )}
        </div>
      )}
      <div className="source-footer">
        <CourseTag courses={courses} />
        {source.contributed === 1 && <span className="tag tag-contributed">Contributed</span>}
        {source.episode_number && <span style={{fontSize: '11px', color: 'var(--text-muted)'}}>Ep. {source.episode_number}</span>}
        <button
          className="btn btn-ghost btn-sm"
          style={{marginLeft: 'auto', fontSize: '11px', padding: '3px 8px', color: noteCount > 0 ? 'var(--accent)' : undefined}}
          onClick={() => setShowFb(s => !s)}
        >{noteCount > 0 ? `${noteCount} Note${noteCount > 1 ? 's' : ''}` : 'Add note'}</button>
        {onDelete && (
          <button onClick={deleteSource} title="Remove from show notes"
            style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:'14px',padding:'0 2px',lineHeight:1,opacity:0.5}}
            onMouseOver={e=>e.currentTarget.style.opacity=1} onMouseOut={e=>e.currentTarget.style.opacity=0.5}>✕</button>
        )}
      </div>
      {showFb && (
        <div style={{marginTop: '12px'}}>
          {existingNotes.map((n, i) => (
            <div key={i} style={{fontSize:'13px', color:'var(--text)', background:'var(--surface2)', borderLeft:'2px solid var(--accent-dim)', padding:'8px 12px', marginBottom:'8px', borderRadius:'0 4px 4px 0'}}>
              {n}
            </div>
          ))}
          <form onSubmit={saveFeedback} style={{display: 'flex', gap: '8px'}}>
            <input
              type="text"
              value={note}
              onChange={e => setNote(e.target.value)}
              placeholder="Add a note about this source…"
              style={{flex: 1}}
            />
            <button type="submit" className="btn btn-ghost btn-sm">{saved ? '✓' : 'Save'}</button>
          </form>
        </div>
      )}
    </div>
  );
}

function ArchivePage() {
  const [episodes, setEpisodes] = useState([]);
  const [selected, setSelected] = useState(null);
  const [loading, setLoading] = useState(true);
  const [discoveringId, setDiscoveringId] = useState(null);
  const [discoverError, setDiscoverError] = useState('');

  useEffect(() => {
    apiFetch('/api/episodes').then(eps => { setEpisodes(eps); setLoading(false); });
  }, []);

  async function selectEp(ep) {
    const full = await apiFetch(`/api/episodes/${ep.id}`);
    setSelected(full);
  }

  async function discoverSources(ep) {
    setDiscoveringId(ep.id);
    setDiscoverError('');
    try {
      const result = await apiFetch(`/api/episodes/${ep.id}/sources/discover`, { method: 'POST', body: {} });
      const full = await apiFetch(`/api/episodes/${ep.id}`);
      setSelected(full);
    } catch(e) { setDiscoverError(e.message); }
    setDiscoveringId(null);
  }

  if (loading) return <div style={{padding:'48px',color:'var(--text-muted)'}}>Loading…</div>;

  if (selected) return (
    <div>
      <button className="btn btn-ghost btn-sm" onClick={() => setSelected(null)} style={{marginBottom:'24px'}}>
        ← All Episodes
      </button>
      <div className="card-meta">Episode {selected.number} · {selected.date}</div>
      <h1 className="page-title" style={{marginBottom:'24px'}}>Episode {selected.number}</h1>

      {selected.audio_filename && (
        <div className="audio-player">
          <audio controls src={`/audio/${selected.audio_filename}`} />
          <div className="audio-actions">
            <a href={`/audio/${selected.audio_filename}`} download className="btn btn-ghost btn-sm">↓ Download</a>
          </div>
        </div>
      )}

      {selected.script && <div className="script-text">{selected.script}</div>}

      <div className="section-label" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span>Sources ({(selected.sources || []).length})</span>
        {(selected.sources || []).length === 0 && (
          <button className="btn btn-sm" onClick={() => discoverSources(selected)} disabled={discoveringId === selected.id}>
            {discoveringId === selected.id ? '⟳ Discovering…' : '⊕ Discover sources'}
          </button>
        )}
      </div>
      {discoverError && <div className="error-msg" style={{marginBottom:'12px'}}>{discoverError}</div>}
      {(selected.sources || []).map(s => <SourceCard key={s.id} source={s} onDelete={id => setSelected(prev => ({...prev, sources: prev.sources.filter(x => x.id !== id)}))} />)}
    </div>
  );

  return (
    <div>
      <h1 className="page-title">Archive</h1>
      <p className="page-subtitle">{episodes.length} episodes</p>
      {episodes.length === 0 && <div className="empty-state">No episodes yet.</div>}
      {episodes.map(ep => (
        <div key={ep.id} className="ep-item" onClick={() => selectEp(ep)}>
          <span className="ep-num">#{ep.number}</span>
          <span className="ep-title">{ep.title || ep.date}</span>
          <span className="ep-meta">{ep.source_count} sources · ~{ep.duration_estimate} min</span>
        </div>
      ))}
    </div>
  );
}

// ── SOURCES PAGE ─────────────────────────────────────────────────────────────

function getFromDate(range) {
  if (!range) return null;
  const d = new Date();
  if (range === '7d')  d.setDate(d.getDate() - 7);
  if (range === '30d') d.setDate(d.getDate() - 30);
  if (range === '90d') d.setDate(d.getDate() - 90);
  return d.toISOString().slice(0, 10);
}

function SourcesPage() {
  const [sources, setSources] = useState([]);
  const [q, setQ] = useState('');
  const [course, setCourse] = useState('');
  const [dateRange, setDateRange] = useState('');
  const [loading, setLoading] = useState(true);

  const load = useCallback(async () => {
    setLoading(true);
    const params = new URLSearchParams();
    if (q) params.set('q', q);
    if (course) params.set('course', course);
    const fromDate = getFromDate(dateRange);
    if (fromDate) params.set('from_date', fromDate);
    const data = await apiFetch(`/api/sources?${params}`);
    setSources(data);
    setLoading(false);
  }, [q, course, dateRange]);

  useEffect(() => { load(); }, [load]);

  return (
    <div>
      <h1 className="page-title">Source Repository</h1>
      <p className="page-subtitle">Every article and source used across all episodes</p>

      <div style={{display:'flex', gap:'12px', marginBottom:'24px', flexWrap:'wrap'}}>
        <div className="search-bar" style={{flex:1}}>
          <span className="search-icon">⌕</span>
          <input
            type="text"
            placeholder="Search titles, summaries, URLs…"
            value={q}
            onChange={e => setQ(e.target.value)}
          />
        </div>
        <select value={course} onChange={e => setCourse(e.target.value)} style={{width:'180px'}}>
          <option value="">All courses</option>
          <option value="intimate_tech">Intimate Technology</option>
          <option value="social_impact">Social Impact Strategy</option>
        </select>
        <select value={dateRange} onChange={e => setDateRange(e.target.value)} style={{width:'150px'}}>
          <option value="">All time</option>
          <option value="7d">Last 7 days</option>
          <option value="30d">Last 30 days</option>
          <option value="90d">Last 90 days</option>
        </select>
      </div>

      {loading && <div style={{color:'var(--text-muted)',fontSize:'13px'}}>Loading…</div>}
      {!loading && sources.length === 0 && <div className="empty-state">No sources found.</div>}
      {!loading && sources.map(s => <SourceCard key={s.id} source={s} />)}
    </div>
  );
}

// ── CONTRIBUTE PAGE ──────────────────────────────────────────────────────────

function ContributePage() {
  const [mode, setMode] = useState('url');
  const [url, setUrl] = useState('');
  const [pasteTitle, setPasteTitle] = useState('');
  const [pasteContent, setPasteContent] = useState('');
  const [fileName, setFileName] = useState('');
  const [fileContent, setFileContent] = useState('');
  const [note, setNote] = useState('');
  const [pending, setPending] = useState([]);
  const [saved, setSaved] = useState(false);
  const [error, setError] = useState('');

  useEffect(() => { apiFetch('/api/contributed').then(setPending); }, []);

  async function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    setFileName(file.name);
    const text = await new Promise((res, rej) => {
      const reader = new FileReader();
      reader.onload = ev => res(ev.target.result);
      reader.onerror = rej;
      reader.readAsText(file);
    });
    setFileContent(text);
  }

  async function submit(e) {
    e.preventDefault();
    setError('');
    let submitUrl = '', submitNote = '';
    if (mode === 'url') {
      if (!url.trim()) return;
      submitUrl = url;
      submitNote = note;
    } else if (mode === 'paste') {
      if (!pasteContent.trim()) { setError('Content is required'); return; }
      const title = pasteTitle.trim() || 'Pasted content';
      submitNote = `[TITLE: ${title}]\n${pasteContent}${note ? '\n[CURATOR NOTE: ' + note + ']' : ''}`;
    } else if (mode === 'file') {
      if (!fileContent) { setError('No file loaded'); return; }
      submitNote = `[FILE: ${fileName}]\n${fileContent}${note ? '\n[CURATOR NOTE: ' + note + ']' : ''}`;
    }
    try {
      await apiFetch('/api/contributed', { method: 'POST', body: { url: submitUrl || undefined, note: submitNote } });
      setUrl(''); setPasteTitle(''); setPasteContent(''); setFileName(''); setFileContent(''); setNote('');
      setSaved(true);
      setTimeout(() => setSaved(false), 2500);
      const updated = await apiFetch('/api/contributed');
      setPending(updated);
    } catch (err) { setError(err.message); }
  }

  const tabBtn = (t, label) => (
    <button onClick={() => setMode(t)} style={{
      padding:'6px 16px', fontSize:'12px', fontWeight: mode===t ? 600 : 400,
      color: mode===t ? 'var(--impact)' : 'var(--text-muted)',
      background:'none', border:'none',
      borderBottom: mode===t ? '2px solid var(--impact)' : '2px solid transparent',
      cursor:'pointer', letterSpacing:'0.04em', textTransform:'uppercase', marginBottom:'-1px'
    }}>{label}</button>
  );

  const unused = pending.filter(u => !u.used);
  const used = pending.filter(u => u.used);

  const displayUrl = (u) => u.url && (u.url.startsWith('text://') || u.url.startsWith('content://'))
    ? <span style={{color:'var(--text-muted)',fontSize:'12px'}}>📄 Text / file content</span>
    : <a href={u.url} target="_blank" rel="noopener">{u.url}</a>;

  return (
    <div>
      <h1 className="page-title">Contribute a Source</h1>
      <p className="page-subtitle">Add a URL, paste article text, or upload a file to the next episode's source pool</p>

      <div className="card">
        <div style={{display:'flex',borderBottom:'1px solid var(--border)',marginBottom:'20px'}}>
          {tabBtn('url','URL')}
          {tabBtn('paste','Paste Text')}
          {tabBtn('file','Upload File')}
        </div>
        <form onSubmit={submit}>
          {mode === 'url' && (<>
            <div className="form-group">
              <label>URL</label>
              <input type="url" value={url} onChange={e => setUrl(e.target.value)} placeholder="https://…" required />
            </div>
            <div className="form-group">
              <label>Note (optional)</label>
              <textarea value={note} onChange={e => setNote(e.target.value)} placeholder="Why this source matters, which course it connects to, anything to tell Claude…" />
            </div>
          </>)}
          {mode === 'paste' && (<>
            <div className="form-group">
              <label>Title</label>
              <input type="text" value={pasteTitle} onChange={e => setPasteTitle(e.target.value)} placeholder="Article or source title" />
            </div>
            <div className="form-group">
              <label>Content</label>
              <textarea value={pasteContent} onChange={e => setPasteContent(e.target.value)} rows={8} placeholder="Paste article text or any content you want Claude to use as a source…" style={{lineHeight:'1.6'}} />
            </div>
            <div className="form-group">
              <label>Note (optional)</label>
              <textarea value={note} onChange={e => setNote(e.target.value)} placeholder="Which course this connects to, angle to take, anything to tell Claude…" />
            </div>
          </>)}
          {mode === 'file' && (<>
            <div className="form-group">
              <label>File (.txt, .md, or any plain text)</label>
              <input type="file" accept=".txt,.md,.text,.csv" onChange={handleFile} style={{color:'var(--text)',fontSize:'13px'}} />
              {fileName && <div style={{marginTop:'6px',fontSize:'12px',color:'var(--text-muted)'}}>{fileName} · {fileContent.length.toLocaleString()} chars loaded</div>}
            </div>
            <div className="form-group">
              <label>Note (optional)</label>
              <textarea value={note} onChange={e => setNote(e.target.value)} placeholder="Which course this connects to, angle to take, anything to tell Claude…" />
            </div>
          </>)}
          <button type="submit" className="btn btn-primary">
            {saved ? '✓ Added' : 'Add to Queue'}
          </button>
          {error && <div className="status-line error">{error}</div>}
        </form>
      </div>

      {unused.length > 0 && (
        <>
          <div className="section-label">Queued for next episode ({unused.length})</div>
          {unused.map(u => (
            <div key={u.id} className="source-item">
              <div className="source-title">{displayUrl(u)}</div>
              {u.note && <div className="source-summary">{u.note.substring(0,200)}{u.note.length>200?'…':''}</div>}
              <div style={{fontSize:'11px',color:'var(--text-muted)',marginTop:'6px'}}>{new Date(u.created_at).toLocaleString()}</div>
            </div>
          ))}
        </>
      )}

      {used.length > 0 && (
        <>
          <div className="section-label">Previously used</div>
          {used.map(u => (
            <div key={u.id} className="source-item" style={{opacity:0.6}}>
              <div className="source-title">{displayUrl(u)}</div>
              {u.note && <div className="source-summary">{u.note.substring(0,200)}{u.note.length>200?'…':''}</div>}
              <span className="tag tag-contributed" style={{marginTop:'6px',display:'inline-block'}}>Used in Ep. {u.episode_id}</span>
            </div>
          ))}
        </>
      )}
    </div>
  );
}

function ThemesPage() {
  const [themes, setThemes] = useState([]);
  const [newName, setNewName] = useState('');
  const [newCourse, setNewCourse] = useState('shared');
  const [error, setError] = useState('');

  const load = () => apiFetch('/api/themes').then(setThemes);
  useEffect(() => { load(); }, []);

  async function toggle(theme) {
    await apiFetch(`/api/themes/${theme.id}`, { method: 'PATCH', body: { active: !theme.active } });
    load();
  }

  async function addTheme(e) {
    e.preventDefault();
    if (!newName.trim()) return;
    try {
      await apiFetch('/api/themes', { method: 'POST', body: { name: newName, course: newCourse } });
      setNewName('');
      load();
    } catch (e) { setError(e.message); }
  }

  async function deleteTheme(id) {
    if (!confirm('Delete this theme?')) return;
    await apiFetch(`/api/themes/${id}`, { method: 'DELETE' });
    load();
  }

  const grouped = {
    intimate_tech: themes.filter(t => t.course === 'intimate_tech'),
    social_impact: themes.filter(t => t.course === 'social_impact'),
    shared: themes.filter(t => t.course === 'shared'),
  };

  const courseLabels = {
    intimate_tech: 'Intimate Technology',
    social_impact: 'Social Impact Strategy',
    shared: 'Shared Themes',
  };

  return (
    <div>
      <h1 className="page-title">Topic Themes</h1>
      <p className="page-subtitle">Active themes are searched on every episode generation. Toggle or add any time.</p>

      {Object.entries(grouped).map(([course, list]) => (
        <div key={course}>
          <div className="section-label">{courseLabels[course]}</div>
          <div className="theme-grid">
            {list.map(t => (
              <div key={t.id} className={`theme-item ${t.active ? 'active' : ''}`}>
                <div
                  className={`theme-toggle ${t.active ? 'checked' : ''}`}
                  onClick={() => toggle(t)}
                  title={t.active ? 'Disable' : 'Enable'}
                >
                  {t.active && <span style={{color:'#0f0f0d',fontSize:'10px',fontWeight:'bold'}}>✓</span>}
                </div>
                <span className="theme-name">{t.name}</span>
                <button
                  onClick={() => deleteTheme(t.id)}
                  style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:'14px',padding:'0 2px',lineHeight:1}}
                  title="Delete"
                >×</button>
              </div>
            ))}
          </div>
        </div>
      ))}

      <div className="section-label">Add New Theme</div>
      <div className="card">
        <form onSubmit={addTheme} style={{display:'flex',gap:'10px',flexWrap:'wrap'}}>
          <input
            type="text"
            value={newName}
            onChange={e => setNewName(e.target.value)}
            placeholder="Theme name…"
            style={{flex:2,minWidth:'200px'}}
          />
          <select value={newCourse} onChange={e => setNewCourse(e.target.value)} style={{flex:1,minWidth:'160px'}}>
            <option value="intimate_tech">Intimate Technology</option>
            <option value="social_impact">Social Impact Strategy</option>
            <option value="shared">Shared</option>
          </select>
          <button type="submit" className="btn btn-primary">Add</button>
        </form>
        {error && <div className="status-line error">{error}</div>}
      </div>
    </div>
  );
}

// ── QUEUE PAGE ───────────────────────────────────────────────────────────────

function QueuePage() {
  const [episodes, setEpisodes] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState('');
  const [editingId, setEditingId] = useState(null);
  const [editScript, setEditScript] = useState('');
  const [editTitle, setEditTitle] = useState('');
  const [publishDate, setPublishDate] = useState({});
  const [saving, setSaving] = useState({});
  const [audioStatus, setAudioStatus] = useState({});
  const [audioTimestamps, setAudioTimestamps] = useState({});
  const [showDiff, setShowDiff] = useState({});
  const [showNotesOpen, setShowNotesOpen] = useState({});
  const [editShowNotes, setEditShowNotes] = useState({});
  const [showNotesSaving, setShowNotesSaving] = useState({});
  const [importScript, setImportScript] = useState('');
  const [importTitle, setImportTitle] = useState('');
  const [importType, setImportType] = useState('dialogue');
  const [importing, setImporting] = useState(false);
  const [showImport, setShowImport] = useState(false);

  const load = async () => {
    try {
      const all = await apiFetch('/api/episodes');
      const drafts = all.filter(e => e.status === 'draft' || e.status === 'scheduled');
      setEpisodes(drafts);
      return drafts;
    } catch(e) { setError(e.message); return []; }
    finally { setLoading(false); }
  };

  // On mount, reconnect to any in-progress audio jobs so navigating away
  // and back doesn't leave the UI stuck.
  useEffect(() => {
    load().then(drafts => {
      drafts.forEach(ep => {
        apiFetch(`/api/episodes/${ep.id}/audio/status`).then(job => {
          if (job && job.status === 'running') {
            setAudioStatus(s => ({ ...s, [ep.id]: job.step || 'generating' }));
            generateAudio(ep);
          }
        }).catch(() => {});
      });
    });
  }, []);

  async function deleteEpisode(ep) {
    if (!confirm(`Delete draft "${ep.title || `Episode ${ep.number}`}"? This cannot be undone.`)) return;
    try {
      await apiFetch(`/api/episodes/${ep.id}`, { method: 'DELETE' });
      await load();
    } catch(e) { setError(e.message); }
  }

  async function importEpisode() {
    if (!importScript.trim()) return;
    setImporting(true);
    try {
      await apiFetch('/api/episodes/import', {
        method: 'POST',
        body: { script: importScript, title: importTitle || undefined, episode_type: importType }
      });
      setImportScript(''); setImportTitle(''); setShowImport(false);
      await load();
    } catch(e) { setError(e.message); }
    setImporting(false);
  }

  async function setStatus(ep, status) {
    setSaving(s => ({ ...s, [ep.id]: true }));
    try {
      const pd = publishDate[ep.id] || ep.publish_at || null;
      await apiFetch(`/api/episodes/${ep.id}/status`, {
        method: 'PATCH',
        body: { status, publish_at: status === 'scheduled' ? pd : null }
      });
      await load();
    } catch(e) { setError(e.message); }
    setSaving(s => ({ ...s, [ep.id]: false }));
  }

  async function saveScript(ep) {
    setSaving(s => ({ ...s, [ep.id]: true }));
    try {
      await apiFetch(`/api/episodes/${ep.id}/script`, {
        method: 'PATCH',
        body: { script: editScript, title: editTitle }
      });
      setEditingId(null);
      await load();
    } catch(e) { setError(e.message); }
    setSaving(s => ({ ...s, [ep.id]: false }));
  }

  async function saveAndRegen(ep) {
    setSaving(s => ({ ...s, [ep.id]: true }));
    try {
      await apiFetch(`/api/episodes/${ep.id}/script`, {
        method: 'PATCH',
        body: { script: editScript, title: editTitle }
      });
      setEditingId(null);
      await load();
      generateAudio(ep);
    } catch(e) { setError(e.message); }
    setSaving(s => ({ ...s, [ep.id]: false }));
  }

  async function generateShowNotes(ep) {
    setShowNotesSaving(s => ({ ...s, [ep.id]: 'generating' }));
    try {
      const res = await apiFetch(`/api/episodes/${ep.id}/show-notes/generate`, { method: 'POST', body: {} });
      setEditShowNotes(s => ({ ...s, [ep.id]: res.show_notes }));
      setEpisodes(prev => prev.map(e => e.id === ep.id ? { ...e, show_notes: res.show_notes } : e));
    } catch(e) { setError(e.message); }
    setShowNotesSaving(s => ({ ...s, [ep.id]: null }));
  }

  async function saveShowNotes(ep) {
    setShowNotesSaving(s => ({ ...s, [ep.id]: 'saving' }));
    try {
      await apiFetch(`/api/episodes/${ep.id}/show-notes`, { method: 'PATCH', body: { show_notes: editShowNotes[ep.id] ?? ep.show_notes ?? '' } });
      setEpisodes(prev => prev.map(e => e.id === ep.id ? { ...e, show_notes: editShowNotes[ep.id] ?? ep.show_notes ?? '' } : e));
    } catch(e) { setError(e.message); }
    setShowNotesSaving(s => ({ ...s, [ep.id]: null }));
  }

  async function generateAudio(ep) {
    setAudioStatus(s => ({ ...s, [ep.id]: 'generating' }));
    try {
      await apiFetch(`/api/episodes/${ep.id}/audio`, { method: 'POST', body: {} });
      let done = false;
      while (!done) {
        await new Promise(r => setTimeout(r, 4000));
        const job = await apiFetch(`/api/episodes/${ep.id}/audio/status`);
        if (job.status === 'complete') { done = true; setAudioStatus(s => ({ ...s, [ep.id]: 'done' })); setAudioTimestamps(s => ({ ...s, [ep.id]: Date.now() })); await load(); }
        else if (job.status === 'error') { done = true; setAudioStatus(s => ({ ...s, [ep.id]: 'error' })); setError(job.error); }
        else setAudioStatus(s => ({ ...s, [ep.id]: job.step || 'generating' }));
      }
    } catch(e) { setError(e.message); setAudioStatus(s => ({ ...s, [ep.id]: 'error' })); }
  }

  const statusBadge = (s) => {
    const styles = {
      draft:     { background: 'rgba(122,120,112,0.2)', color: '#7a7870', border: '1px solid #3a3a36' },
      scheduled: { background: 'rgba(159,187,138,0.15)', color: '#9fbb8a', border: '1px solid #4a6040' },
      published: { background: 'rgba(200,169,110,0.15)', color: '#c8a96e', border: '1px solid #6a5030' },
    };
    return <span style={{ ...styles[s], padding: '2px 8px', borderRadius: '4px', fontSize: '11px', fontWeight: 500, letterSpacing: '0.04em', textTransform: 'uppercase' }}>{s}</span>;
  };

  if (loading) return <div style={{padding:'48px',color:'var(--text-muted)'}}>Loading…</div>;

  return (
    <div>
      <h1 className="page-title">Queue</h1>
      <p className="page-subtitle">Draft and scheduled episodes. Nothing here appears in the RSS feed until published.</p>

      {error && <div className="error-msg" style={{marginBottom:'24px'}}>{error}<button onClick={()=>setError('')} style={{marginLeft:'12px',background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer'}}>✕</button></div>}

      {/* Import form */}
      <div style={{marginBottom:'24px'}}>
        <button className="btn btn-ghost btn-sm" onClick={() => setShowImport(s => !s)}>
          {showImport ? '✕ Cancel import' : '↑ Import a script'}
        </button>
        {showImport && (
          <div style={{marginTop:'16px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'8px',padding:'20px'}}>
            <div style={{fontSize:'13px',color:'var(--text-muted)',marginBottom:'16px'}}>Paste a script to create a new draft. Intros and outros are prepended/appended automatically.</div>
            <input
              value={importTitle}
              onChange={e => setImportTitle(e.target.value)}
              placeholder="Episode title (optional)"
              style={{width:'100%',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'4px',padding:'8px 12px',color:'var(--text)',fontSize:'13px',marginBottom:'8px'}}
            />
            <div style={{display:'flex',gap:'8px',marginBottom:'8px'}}>
              {['dialogue','megan_only'].map(t => (
                <button key={t} className={`btn btn-sm${importType === t ? ' btn-primary' : ' btn-ghost'}`}
                  onClick={() => setImportType(t)}>
                  {t === 'dialogue' ? 'Dialogue' : 'Megan Only'}
                </button>
              ))}
            </div>
            <textarea
              value={importScript}
              onChange={e => setImportScript(e.target.value)}
              placeholder="Paste script here…"
              rows={12}
              style={{width:'100%',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'4px',padding:'12px',color:'var(--text)',fontSize:'13px',fontFamily:'monospace',lineHeight:'1.6',resize:'vertical'}}
            />
            <div style={{display:'flex',gap:'8px',marginTop:'8px',alignItems:'center'}}>
              <button className="btn btn-primary" onClick={importEpisode} disabled={importing || !importScript.trim()}>
                {importing ? 'Importing…' : 'Import as Draft'}
              </button>
              {importScript.trim() && <span style={{fontSize:'11px',color:'var(--text-muted)'}}>{importScript.trim().split(/\s+/).length} words · ~{Math.round(importScript.trim().split(/\s+/).length/150)} min</span>}
            </div>
          </div>
        )}
      </div>

      {episodes.length === 0 && (
        <div style={{color:'var(--text-muted)',marginTop:'48px',textAlign:'center'}}>
          <div style={{fontSize:'28px',marginBottom:'12px'}}>◎</div>
          <div>No episodes in the queue.</div>
        </div>
      )}

      {episodes.map(ep => (
        <div key={ep.id} style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'8px',padding:'24px',marginBottom:'16px'}}>

          {/* Header */}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'16px'}}>
            <div>
              {statusBadge(ep.status)}
              <div style={{marginTop:'8px',fontFamily:'Playfair Display, serif',fontSize:'16px',color:'var(--text)'}}>
                {ep.title || `Episode ${ep.number}`}
              </div>
              <div style={{fontSize:'12px',color:'var(--text-muted)',marginTop:'4px'}}>
                #{ep.number} · {ep.date} · {ep.episode_type} · ~{ep.duration_estimate || '?'} min
                {ep.audio_filename && <span style={{color:'var(--impact)',marginLeft:'8px'}}>● audio ready</span>}
              </div>
            </div>
            {ep.status === 'draft' && (
              <button
                onClick={() => deleteEpisode(ep)}
                title="Delete draft"
                style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:'16px',padding:'4px',lineHeight:1,opacity:0.6}}
                onMouseOver={e => e.currentTarget.style.opacity=1}
                onMouseOut={e => e.currentTarget.style.opacity=0.6}
              >✕</button>
            )}
          </div>

          {/* Script editor */}
          {editingId === ep.id ? (
            <div style={{marginBottom:'16px'}}>
              <input
                value={editTitle}
                onChange={e => setEditTitle(e.target.value)}
                placeholder="Episode title"
                style={{width:'100%',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'4px',padding:'8px 12px',color:'var(--text)',fontSize:'13px',marginBottom:'8px'}}
              />
              {/* Stats bar */}
              <div style={{display:'flex',gap:'16px',fontSize:'11px',color:'var(--text-muted)',marginBottom:'6px',alignItems:'center'}}>
                <span>{editScript.trim().split(/\s+/).filter(Boolean).length} words</span>
                <span>~{Math.round(editScript.trim().split(/\s+/).filter(Boolean).length / 150)} min</span>
                {ep.original_script && ep.original_script !== editScript && (
                  <button
                    className="btn btn-sm"
                    style={{fontSize:'11px',padding:'2px 8px',marginLeft:'auto'}}
                    onClick={() => setShowDiff(s => ({ ...s, [ep.id]: !s[ep.id] }))}
                  >
                    {showDiff[ep.id] ? 'Hide diff' : 'Show diff vs. original'}
                  </button>
                )}
              </div>
              {/* Diff view */}
              {showDiff[ep.id] && ep.original_script && (
                <div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'4px',padding:'12px',marginBottom:'8px',fontSize:'12px',fontFamily:'monospace',lineHeight:'1.7',maxHeight:'300px',overflowY:'auto'}}>
                  {(() => {
                    const orig = ep.original_script.split('\n');
                    const curr = editScript.split('\n');
                    const maxLen = Math.max(orig.length, curr.length);
                    return Array.from({length: maxLen}, (_, i) => {
                      const o = orig[i]; const c = curr[i];
                      if (o === c) return <div key={i} style={{color:'var(--text-muted)'}}>{o || '\u00a0'}</div>;
                      return <React.Fragment key={i}>
                        {o !== undefined && <div style={{color:'#e07070',textDecoration:'line-through',opacity:0.7}}>{o}</div>}
                        {c !== undefined && <div style={{color:'var(--impact)'}}>{c}</div>}
                      </React.Fragment>;
                    });
                  })()}
                </div>
              )}
              <textarea
                value={editScript}
                onChange={e => setEditScript(e.target.value)}
                rows={20}
                style={{width:'100%',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'4px',padding:'12px',color:'var(--text)',fontSize:'13px',fontFamily:'monospace',lineHeight:'1.6',resize:'vertical'}}
              />
              <div style={{display:'flex',gap:'8px',marginTop:'8px',flexWrap:'wrap'}}>
                <button className="btn btn-primary" onClick={() => saveScript(ep)} disabled={saving[ep.id]}>
                  {saving[ep.id] ? 'Saving…' : 'Save'}
                </button>
                <button className="btn" onClick={() => saveAndRegen(ep)} disabled={saving[ep.id]}>
                  {saving[ep.id] ? 'Saving…' : '↻ Save & regenerate audio'}
                </button>
                <button className="btn" onClick={() => { setEditingId(null); setShowDiff(s => ({ ...s, [ep.id]: false })); }}>Cancel</button>
              </div>
            </div>
          ) : (
            <div style={{background:'var(--surface2)',borderRadius:'4px',padding:'12px',marginBottom:'16px',fontSize:'12px',color:'var(--text-muted)',fontFamily:'monospace',lineHeight:'1.7',maxHeight:'120px',overflow:'hidden',position:'relative'}}>
              {(ep.script || '').substring(0, 400).split('\n').map((line, i) => {
                const isMegan = line.startsWith('MEGAN:');
                const isAdam = line.startsWith('ADAM:');
                if (isMegan || isAdam) {
                  const speaker = isMegan ? 'MEGAN' : 'ADAM';
                  const rest = line.slice(speaker.length + 1);
                  return <div key={i}>
                    <span style={{fontWeight:700,color: isMegan ? 'var(--impact)' : 'var(--accent)',marginRight:'4px'}}>{speaker}:</span>
                    {rest}
                  </div>;
                }
                return <div key={i}>{line || '\u00a0'}</div>;
              })}…
              <div style={{position:'absolute',bottom:0,left:0,right:0,height:'32px',background:'linear-gradient(transparent, var(--surface2))'}} />
            </div>
          )}

          {/* Actions */}
          <div style={{display:'flex',gap:'8px',flexWrap:'wrap',alignItems:'center'}}>
            {editingId !== ep.id && (
              <button className="btn" onClick={() => { setEditingId(ep.id); setEditScript(ep.script||''); setEditTitle(ep.title||''); }}>
                ✎ Edit script
              </button>
            )}

            {editingId !== ep.id && (
              <button className="btn" onClick={() => generateAudio(ep)} disabled={!!audioStatus[ep.id] && audioStatus[ep.id] !== 'done' && audioStatus[ep.id] !== 'error'}>
                {audioStatus[ep.id] && audioStatus[ep.id] !== 'done' && audioStatus[ep.id] !== 'error'
                  ? `⟳ ${audioStatus[ep.id]}`
                  : ep.audio_filename ? '↻ Regenerate audio' : '▶ Generate audio'}
              </button>
            )}

            {ep.audio_filename && (
              <audio controls src={`/audio/${ep.audio_filename}${audioTimestamps[ep.id] ? `?v=${audioTimestamps[ep.id]}` : ''}`} style={{height:'32px',flex:'1',minWidth:'200px'}} />
            )}

            <div style={{display:'flex',gap:'6px',alignItems:'center',marginLeft:'auto'}}>
              {ep.status === 'draft' && (
                <>
                  <input
                    type="date"
                    value={publishDate[ep.id] || ep.publish_at || ''}
                    onChange={e => setPublishDate(d => ({ ...d, [ep.id]: e.target.value }))}
                    style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'4px',padding:'4px 8px',color:'var(--text)',fontSize:'12px'}}
                  />
                  <button className="btn"
                    onClick={() => setStatus(ep, 'scheduled')}
                    disabled={!publishDate[ep.id] || saving[ep.id]}
                    title="Schedule for selected date"
                  >
                    Schedule
                  </button>
                  <button className="btn btn-primary" onClick={() => setStatus(ep, 'published')} disabled={saving[ep.id]}>
                    {saving[ep.id] ? 'Publishing…' : 'Publish now'}
                  </button>
                </>
              )}
              {ep.status === 'scheduled' && (
                <>
                  <span style={{fontSize:'12px',color:'var(--text-muted)'}}>Publishes {ep.publish_at}</span>
                  <button className="btn" onClick={() => setStatus(ep, 'draft')} disabled={saving[ep.id]}>Unschedule</button>
                  <button className="btn btn-primary" onClick={() => setStatus(ep, 'published')} disabled={saving[ep.id]}>Publish now</button>
                </>
              )}
            </div>
          </div>

          {/* Show Notes */}
          <div style={{marginTop:'16px',borderTop:'1px solid var(--border)',paddingTop:'12px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom: showNotesOpen[ep.id] ? '10px' : 0}}>
              <button
                className="btn btn-ghost btn-sm"
                onClick={() => {
                  setShowNotesOpen(s => ({ ...s, [ep.id]: !s[ep.id] }));
                  if (!showNotesOpen[ep.id] && editShowNotes[ep.id] === undefined) {
                    setEditShowNotes(s => ({ ...s, [ep.id]: ep.show_notes || '' }));
                  }
                }}
              >
                {showNotesOpen[ep.id] ? '▾ Show notes' : '▸ Show notes'}
                {ep.show_notes ? '' : <span style={{color:'var(--text-muted)',marginLeft:'6px',fontWeight:400}}>(not yet generated)</span>}
              </button>
              {showNotesOpen[ep.id] && (
                <button
                  className="btn btn-sm"
                  onClick={() => generateShowNotes(ep)}
                  disabled={!!showNotesSaving[ep.id]}
                >
                  {showNotesSaving[ep.id] === 'generating' ? '⟳ Generating…' : '↻ Regenerate'}
                </button>
              )}
            </div>
            {showNotesOpen[ep.id] && (
              <div>
                <textarea
                  value={editShowNotes[ep.id] ?? ep.show_notes ?? ''}
                  onChange={e => setEditShowNotes(s => ({ ...s, [ep.id]: e.target.value }))}
                  rows={6}
                  style={{width:'100%',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'4px',padding:'10px 12px',color:'var(--text)',fontSize:'12px',fontFamily:'monospace',lineHeight:'1.5',resize:'vertical'}}
                />
                <div style={{display:'flex',gap:'8px',marginTop:'6px',marginBottom:'12px'}}>
                  <button
                    className="btn btn-primary btn-sm"
                    onClick={() => saveShowNotes(ep)}
                    disabled={!!showNotesSaving[ep.id]}
                  >
                    {showNotesSaving[ep.id] === 'saving' ? 'Saving…' : 'Save'}
                  </button>
                </div>
                {(editShowNotes[ep.id] ?? ep.show_notes) && (
                  <div style={{borderTop:'1px solid var(--border)',paddingTop:'10px'}}>
                    <div style={{fontSize:'11px',color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:'8px'}}>Preview</div>
                    <div
                      style={{fontSize:'13px',lineHeight:'1.6',color:'var(--text)'}}
                      dangerouslySetInnerHTML={{__html: editShowNotes[ep.id] ?? ep.show_notes}}
                    />
                  </div>
                )}
              </div>
            )}
          </div>

        </div>
      ))}
    </div>
  );
}

// ── APP SHELL ────────────────────────────────────────────────────────────────

const PAGES = {
  today: { label: 'Today', icon: '◉', component: TodayPage },
  queue: { label: 'Queue', icon: '⊡', component: QueuePage },
  archive: { label: 'Archive', icon: '◎', component: ArchivePage },
  sources: { label: 'Sources', icon: '⊞', component: SourcesPage },
  contribute: { label: 'Contribute', icon: '+', component: ContributePage },
  themes: { label: 'Themes', icon: '◈', component: ThemesPage },
  settings: { label: 'Settings', icon: '⊙', component: SettingsPage },
};

function App() {
  const [page, setPage] = useState('today');
  const Page = PAGES[page].component;

  const MOBILE_PAGES = [
    ['today',      'Today',   '◉'],
    ['archive',    'Archive', '◎'],
    ['sources',    'Sources', '⊞'],
    ['contribute', 'Add',     '+'],
    ['themes',     'Themes',  '◈'],
    ['settings',   'More',    '⊙'],
  ];

  return (
    <div className="app">
      <div className="sidebar">
        <div className="sidebar-header">
          <div className="sidebar-logo">The Overhang</div>
          <div className="sidebar-sub">Research Podcast</div>
        </div>
        <nav className="sidebar-nav">
          {Object.entries(PAGES).map(([key, { label, icon }]) => (
            <div
              key={key}
              className={`nav-item ${page === key ? 'active' : ''}`}
              onClick={() => setPage(key)}
            >
              <span className="nav-icon">{icon}</span>
              {label}
            </div>
          ))}
        </nav>
        <div className="sidebar-footer">
          Intimate Technology<br />
          Social Impact Strategy
        </div>
        <form method="POST" action="/logout" style={{padding:'12px 16px 20px'}}>
    <button type="submit" style={{width:'100%',background:'none',border:'1px solid #2e2e2a',borderRadius:'6px',padding:'7px 12px',color:'#7a7870',fontSize:'12px',cursor:'pointer',letterSpacing:'0.04em'}}>
      Sign out
    </button>
  </form>
      </div>
      <main className="main">
        <Page onNavigate={setPage} />
      </main>
      <nav className="mobile-nav">
        {MOBILE_PAGES.map(([key, label, icon]) => (
          <div
            key={key}
            className={`mobile-nav-item ${page === key ? 'active' : ''}`}
            onClick={() => setPage(key)}
          >
            <span className="mobile-nav-icon">{icon}</span>
            <span>{label}</span>
          </div>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
